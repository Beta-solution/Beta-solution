<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Create profile</title></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<h1>Create profile</h1>
<form th:action="@{/profiles/create}" th:object="${profileForm}" method="post">
    <label>Name: <input type="text" th:field="*{name}"/></label><br/>
    <label>Username: <input type="text" th:field="*{username}"/></label><br/>
    <label>Password: <input type="password" th:field="*{password}"/></label><br/>
    <label>Email: <input type="email" th:field="*{email}"/></label><br/>
    <label>Role:
        <select th:field="*{role}">
            <option value="JUNIOR">Junior</option>
            <option value="SENIOR">Senior</option>
            <option value="OWNER">Owner</option>
        </select>
    </label><br/>
    <button type="submit">Create</button>
</form>
<a href="/profiles">Back</a>
</body>
</html>
