<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Edit Subtask</title></head>
<body>
<h1>Edit Subtask</h1>
<form th:action="@{/tasks/{taskId}/subtasks/{id}/edit(taskId=${taskId},id=${subTask.id})}" th:object="${subTask}" method="post">
    <label>Name: <input type="text" th:field="*{name}"/></label><br/>
    <label>Description: <input type="text" th:field="*{description}"/></label><br/>
    <label>Duration: <input type="number" step="0.01" th:field="*{duration}"/></label><br/>
    <button type="submit">Save</button>
</form>
<a th:href="@{/tasks/{id}/subtasks(id=${taskId})}">Back</a>
</body>
</html>
