<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Profile</title></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<h1>Profile</h1>
<p><strong>ID:</strong> <span th:text="${profile.id}"></span></p>
<p><strong>Name:</strong> <span th:text="${profile.name}"></span></p>
<p><strong>Role:</strong> <span th:text="${profile.role}"></span></p>
<p><strong>Username:</strong> <span th:text="${profile.username}"></span></p>
<p><strong>Email:</strong> <span th:text="${profile.email}"></span></p>
<a href="/profiles">Back</a>
</body>
</html>
