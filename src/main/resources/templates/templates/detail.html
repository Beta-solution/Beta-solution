<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Template</title></head>
<body>
<h1>Template</h1>
<p><strong>ID:</strong> <span th:text="${template.id}"></span></p>
<p><strong>Name:</strong> <span th:text="${template.name}"></span></p>
<p><strong>Description:</strong> <span th:text="${template.description}"></span></p>
<p><strong>Hourly Rate:</strong> <span th:text="${template.hourlyRate}"></span></p>
<p><strong>Estimated Deadline:</strong> <span th:text="${template.estimatedDeadlineDays}"></span></p>

<h2>Tasks</h2>
<ul>
    <li th:each="task : ${template.taskTemplates}">
        <strong th:text="${task.name}"></strong> - <span th:text="${task.description}"></span>
        <ul>
            <li th:each="subTask : ${task.subTaskTemplates}">
                <span th:text="${subTask.name}"></span> - <span th:text="${subTask.description}"></span>
            </li>
        </ul>
    </li>
</ul>

<a href="/templates">Back</a>
</body>
</html>
