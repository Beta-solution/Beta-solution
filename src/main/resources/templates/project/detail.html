<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Project</title></head>
<body>
<h1>Project</h1>
<p><strong>ID:</strong> <span th:text="${project.id}"></span></p>
<p><strong>Name:</strong> <span th:text="${project.name}"></span></p>
<p><strong>Description:</strong> <span th:text="${project.description}"></span></p>
<p><strong>Hourly Rate:</strong> <span th:text="${project.hourlyRate}"></span></p>
<p><strong>Total Duration:</strong> <span th:text="${totalDuration}"></span> hours</p>
<p><strong>Estimated Price:</strong> <span th:text="${estimatedPrice}"></span></p>
<a th:href="@{/projects/{id}/tasks(id=${project.id})}">View Tasks</a> |
<a th:href="@{/projects/{id}/members(id=${project.id})}">View Members</a> |
<a th:href="@{/projects/{id}/edit(id=${project.id})}">Edit</a> |
<a href="/projects">Back</a>
</body>
</html>
